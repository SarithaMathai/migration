# plm-measurement — Federation v2.3 Schema
#
# Derived from spark-internal-graphql `SPARK_Measurement` + `SPARK_MeasurementTemplate`.
# Naming: `SPARK_` prefix dropped; `Measurements` → `MeasurementSet`; templates kept as `MeasurementTemplate`.
# Sample-measurement set is kept as a sub-resource of MeasurementSet but addressable by sampleId.

extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.3",
    import: ["@key", "@extends", "@external", "@shareable", "@requires", "@inaccessible", "@tag"]
  )

# ----------------------------------------------------------------------
# Entities
# ----------------------------------------------------------------------

type MeasurementSet @key(fields: "id") {
  id: ID!                            # was humanId
  parentId: String                   # was resourceId / parentId
  name: String
  notes: String
  type: String
  baseType: MeasurementBaseType      # 100 = product, 101 = template
  manualLock: Boolean
  version: Int

  status: CodeDescription
  statuses: [ComponentStatus!]
  toleranceSet: CodeDescription
  defaultUnitOfMeasure: UnitOfMeasure
  coreSizes: [MeasurementSetCoreSize!]
  rows: [MeasurementRow!]

  # Federation contributions
  product: Product                   # via parentId starting with "PID"
  workspaces: [Workspace!]
  workspaceContext: [ID!]
  businessPartners: [BusinessPartner!]
  participantDetails: UserGroupParticipants
  access: AccessControl
  currentUserPermissions: ResourcePermissions
  measurementTemplates: [MeasurementTemplate!]
  sizeTemplate: SizeTemplate
  tightFitTemplate: TightFit
  updatedFromResource: SampleV2      # currently only 'sample' polymorphism realized

  createdAt: DateTime
  createdBy: UserProfileAttributes
  updatedAt: DateTime
  updatedBy: UserProfileAttributes
}

type MeasurementTemplate @key(fields: "id") {
  id: ID!                            # was humanId
  name: String
  status: CodeDescription
  version: Int
  rows: [MeasurementTemplateRow!]
  divisions: [Division!]
  brands: [Brand!]
  departments: [Department!]
  createdAt: DateTime
  createdBy: UserProfileAttributes
  updatedAt: DateTime
  updatedBy: UserProfileAttributes
}

# Sample-measurement is sub-resource; keyed by sampleId for direct fetch.
type SampleMeasurementSet @key(fields: "sampleId") {
  sampleId: String!
  measurementSetId: String
  measurementSetName: String
  measurementSetType: String
  measurementSize: SizeCodeDescription
  measurementSizeId: String          # synthesized from measurementSize.code
  measurementSetVersion: Int
  version: Int
  rows: [SampleMeasurementSetRow!]
  createdAt: DateTime
  createdBy: UserProfileAttributes
}

# ----------------------------------------------------------------------
# Extended entities (federation contributions)
# ----------------------------------------------------------------------

extend type Product @key(fields: "id") {
  id: ID! @external
  # Measurement sets associated with this product (via parentId / relationships)
  measurementSets(calculated: Boolean, businessPartnerIds: [String!], mustHaveRows: Boolean): MeasurementSetConnection
}

extend type SampleV2 @key(fields: "id") {
  id: ID! @external
  sampleMeasurement: SampleMeasurementSet
}

# ----------------------------------------------------------------------
# External entity stubs
# ----------------------------------------------------------------------

extend type Workspace @key(fields: "id") { id: ID! @external }
extend type BusinessPartner @key(fields: "id") { id: ID! @external }
extend type Brand @key(fields: "id") { id: ID! @external }
extend type Division @key(fields: "id") { id: ID! @external }
extend type Department @key(fields: "id") { id: ID! @external }
extend type UserProfileAttributes @key(fields: "id") { id: ID! @external }
extend type UserGroupParticipants @key(fields: "id") { id: ID! @external }
extend type AccessControl @key(fields: "id") { id: ID! @external }
extend type ResourcePermissions @key(fields: "id") { id: ID! @external }
extend type SizeTemplate @key(fields: "id") { id: ID! @external }
extend type TightFit @key(fields: "id version") { id: ID! @external version: Int! @external }
extend type ComponentStatus @key(fields: "id") { id: ID! @external }

# ----------------------------------------------------------------------
# Value types
# ----------------------------------------------------------------------

type MeasurementRow {
  rowId: String
  critical: Boolean
  sizeValues: [PomSize!]
  notes: String
  pointOfMeasure: Pom
  toleranceOver: String
  toleranceUnder: String
  baseSizeValue: Float
  unitOfMeasure: UnitOfMeasure
}

type MeasurementTemplateRow {
  pointOfMeasure: Pom
  toleranceOver: String
  toleranceUnder: String
  unitOfMeasure: UnitOfMeasure
}

type SampleMeasurementSetRow {
  rowId: String
  measurementNew: Float
  measurementPartner: Float
  measurementTarget: Float
  measurementSetCritical: Boolean
  requestedSampleSize: Float
  pointOfMeasure: Pom
  unitOfMeasure: UnitOfMeasure
  toleranceOver: String
  toleranceUnder: String
  notes: String
}

type PomSize {
  code: String
  description: String
  diffFromNeighbor: Float
  manualValue: Float
  calculatedValue: Float
  displayValue: Float
}

type MeasurementSetCoreSize {
  coreSizeId: ID
  baseSize: SizeCodeDescription
  sizeGroupId: ID
  sizes: [SizeCodeDescription!]
}

type MeasurementBaseType {
  type: Int
}

type UnitOfMeasure @shareable {
  name: String
  description: String
  shortDescription: String
  code: Int
}

type MeasurementSetConnection {
  content: [MeasurementSet!]!
}

type MeasurementTemplateConnection {
  content: [MeasurementTemplate!]!
  pageable: Pageable
  paging: Paging
}

# Shared scalars (declared @shareable where they cross subgraphs)
type CodeDescription @shareable { code: String description: String }
type SizeCodeDescription @shareable { code: String description: String }
type Pom @shareable { id: ID code: String description: String }
type Pageable @shareable { pageNumber: Int pageSize: Int offset: Int }
type Paging @shareable { totalPages: Int totalElements: Int first: Boolean numberOfElements: Int size: Int number: Int last: Boolean sort: String }

scalar DateTime

# ----------------------------------------------------------------------
# Queries
# ----------------------------------------------------------------------

extend type Query {
  measurementSet(id: ID!): MeasurementSet
  measurementSetsByIds(ids: [ID!]!, calculated: Boolean): [MeasurementSet!]!
  measurementSets(parentId: String!, calculated: Boolean, businessPartnerIds: [String!], mustHaveRows: Boolean): MeasurementSetConnection
  measurementSetsElastic(parentId: String!): MeasurementSetConnection
  measurementSetStatuses: [CodeDescription!]!
  sampleMeasurement(sampleId: ID!): SampleMeasurementSet

  unitsOfMeasure(ids: [ID!]): [UnitOfMeasure!]!
  thicknessUnitsOfMeasure: [UnitOfMeasure!]!

  measurementTemplate(id: ID!): MeasurementTemplate
  measurementTemplatesByIds(ids: [ID!]!): [MeasurementTemplate!]!
  measurementTemplates(page: Int!, size: Int!): MeasurementTemplateConnection
}

# ----------------------------------------------------------------------
# Mutations
# ----------------------------------------------------------------------

extend type Mutation {
  addMeasurementSet(input: MeasurementSetInput!): MeasurementSet!
  updateMeasurementSet(input: MeasurementSetUpdateInput!): MeasurementSet!
  updateMeasurementSetAccess(id: ID!, access: MeasurementAccessInput!): MeasurementSet!
  lockMeasurementSet(id: ID!): MeasurementSet!
  unlockMeasurementSet(id: ID!): MeasurementSet!
  updateMeasurementComponentStatus(productId: ID!, measurementSetIds: [ID!]!, status: ComponentStatusInput!): MeasurementSetConnection!

  putSampleMeasurementSet(input: SampleMeasurementSetInput!): SampleMeasurementSet!
  deleteSampleMeasurementSet(sampleId: ID!): SampleMeasurementSet

  addMeasurementTemplate(input: MeasurementTemplateInput!): MeasurementTemplate!
  updateMeasurementTemplate(input: MeasurementTemplateUpdateInput!): MeasurementTemplate!
  deleteMeasurementTemplate(ids: [ID!]!): Boolean!
}

# ----------------------------------------------------------------------
# Inputs
# ----------------------------------------------------------------------

input MeasurementSetInput {
  name: String!
  notes: String
  parentId: String                              # was resourceId
  type: String
  baseType: MeasurementBaseTypeInput
  toleranceSetId: Int
  defaultUnitOfMeasureId: Int
  statusId: Int
  systemTeamIds: [String!]
  systemTeamDto: SystemTeamsWithTypeInput
  workspaceContext: [ID!]
  sizeTemplate: VersionableIdInput
  tightFitTemplate: VersionableIdInput
  measurementTemplates: [VersionableIdInput!]
  coreSizes: [MeasurementSetCoreSizeInput!]
  rows: [MeasurementRowInput!]
  participantDetails: UserGroupParticipantsInput
}

input MeasurementSetUpdateInput {
  id: ID!                                       # was humanId
  parentId: String
  name: String
  notes: String
  type: String
  baseType: MeasurementBaseTypeInput
  toleranceSetId: Int
  defaultUnitOfMeasureId: Int
  statusId: Int
  systemTeamDto: SystemTeamsWithTypeInput
  statuses: [WorkspaceStatusPairInput!]
  sizeTemplate: VersionableIdInput
  tightFitTemplate: VersionableIdInput
  measurementTemplates: [VersionableIdInput!]
  coreSizes: [MeasurementSetCoreSizeInput!]
  rows: [MeasurementRowInput!]
  updateWorkspaceAssociations: PartialWorkspaceAssociationsInput
}

# Tagged-union refactor of the old polymorphic access input (Phase 2B M3 finding):
input MeasurementAccessInput {
  systemTeamIds: [String!]
  systemTeamDto: SystemTeamsWithTypeInput
}

input MeasurementRowInput {                     # was `Spark_MeasurementRowInput` casing anomaly
  rowId: String
  critical: Boolean
  sizeValues: [PomSizeInput!]
  notes: String
  pointOfMeasure: PomInput
  toleranceOver: String
  toleranceUnder: String
  baseSizeValue: Float
  unitOfMeasureId: Int
}

input PomSizeInput {
  code: String
  description: String
  diffFromNeighbor: Float
  manualValue: Float
  calculatedValue: Float
}

input PomInput { id: ID code: String description: String }

input MeasurementSetCoreSizeInput {
  coreSizeId: ID
  baseSize: SizeCodeDescriptionInput
  sizeGroupId: ID
  sizes: [SizeCodeDescriptionInput!]
}

input SizeCodeDescriptionInput { code: String description: String }

input MeasurementBaseTypeInput { type: Int }

input SystemTeamsWithTypeInput {
  mvTeams: [String!]
  dpTeams: [String!]
}

input VersionableIdInput { id: ID! version: Int }
input PartialWorkspaceAssociationsInput {
  addWorkspaces: [WorkspaceAssociationInput!]
  removeWorkspaces: [WorkspaceAssociationInput!]
}
input WorkspaceAssociationInput { id: ID! }
input WorkspaceStatusPairInput { workspaceId: ID! statusId: Int! }
input UserGroupParticipantsInput { _placeholder: String }
input ComponentStatusInput { statusId: Int }

input SampleMeasurementSetInput {
  sampleId: ID!
  measurementSetId: ID!
  measurementSizeId: String
  measurementSetVersion: Int
  rows: [SampleMeasurementSetRowInput!]
}

input SampleMeasurementSetRowInput {
  rowId: String
  measurementNew: Float
  measurementPartner: Float
  measurementTarget: Float
  requestedSampleSize: Float
  notes: String
  updateParentMeasurementSet: Boolean
}

input MeasurementTemplateInput {
  name: String!
  divisionIds: [Int!]
  brandIds: [Int!]
  departmentIds: [Int!]
  statusId: Int
  rows: [MeasurementTemplateRowInput!]
}

input MeasurementTemplateUpdateInput {
  templateId: ID!
  name: String
  divisionIds: [Int!]
  brandIds: [Int!]
  departmentIds: [Int!]
  statusId: Int
  rows: [MeasurementTemplateRowInput!]
}

input MeasurementTemplateRowInput {
  pointOfMeasure: PomInput
  toleranceOver: String
  toleranceUnder: String
  unitOfMeasureId: Int
}
