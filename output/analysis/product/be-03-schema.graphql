# ---- Categories (polymorphic right-rail facets) ----
# SOURCE SDL NOTE: the source models this as `interface SPARK_Categories { id: ID, name: String }`
# (code/schemas/core.txt:116) with 13 implementers. We model the TARGET as a union of the 12 concrete
# types the resolver's __resolveType actually returns (code/resolvers/SPARK_Product.txt:2470-2511).
#   • IG_MerchType implements the interface in the SDL but is NEVER returned here — intentionally omitted.
#   • Union (not interface) is the deliberate federation choice: members include platform/external stubs
#     (VMM_Brand, IG_Department, IG_Division, IG_Clazz_Filter) that cannot `implements` a local interface
#     across subgraphs. ⚠ CLIENT CONTRACT: with an interface, clients select `id`/`name` directly on
#     `[Categories]`; with a union they need inline fragments. Verify consumers before cutover (A-04/G-04).
union Categories =
  | VMM_Brand
  | IG_Department
  | IG_Division
  | IG_Clazz_Filter
  | ProductStatus
  | VMM_BusinessPartnerCategory
  | Tag_Elastic
  | Filter_SetDates
  | Status
  | FilterSampleType
  | FilterSampleFormat
  | Packaging_Field
# DGS: implement `@DgsTypeResolver(name = "Categories")` mapping
# category.type → concrete type. Preserve current default → IG_Clazz_Filter.

type Tag_Elastic         { id: ID, name: String, type: String }
type Filter_SetDates     { id: ID, name: String, type: String }
type Status              { id: ID, name: String, type: String }
type FilterSampleType    { id: ID, name: String, type: String }
type FilterSampleFormat  { id: ID, name: String, type: String }
type Packaging_Field     { id: ID, name: String, type: String }

type ProductsCategories {
  categories(type: String): [Categories]
  categoryIds: [ID]
  count: Int
}

