# =============================================================================
# Product Domain — Federated Target DGS Schema (translated from source SDL)
# Generated: 2026-06-26  ·  Pipeline Version: 2.0
# DGS Target: Green-field — `plm-product` repo (Kotlin / Netflix DGS)
# Source:     code/schemas/SPARK_Product.txt (the real SDL) + code/resolvers/SPARK_Product.txt (behaviour)
# Target:     plm-product/apps/app/src/main/resources/schema/product.graphqls
# This is the FEDERATED TARGET schema, translated from the source SDL (SPARK_ prefix dropped, @key/
# @shareable/@extends added). Nullability is taken from the SDL. Where SDL and resolver disagree on
# behaviour, the resolver wins (e.g. the Product.division latent bug — see §2 OWNED ENTITY note).
# ACL: capability-token (JWT) usage in source is context-only; ACL is IGNORED in the DGS
#      implementation (no ACL plumbing story). See 03-schema-analysis.md §ACL.
#
# Conventions:
#   • Drop `SPARK_` prefix from owned types.
#   • Keep platform prefixes (`VMM_`, `IG_`, `CORONA_`, `DOPPLER_`) for stitched stubs.
#   • Federation v2.3 (`@key`, `@extends`, `@external`, `@requires`, `@shareable`).
#
# Status legend:
#   ✅ already in DGS  ·  🔜 needs migration  ·  ⏭ deferred / latent
# =============================================================================

extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.3",
    import: ["@key", "@extends", "@external", "@requires", "@shareable"]
  )

# ---- Scalars ----
scalar DateTime

# =============================================================================
# 1. EXTERNAL STUBS — Gateway-stitched (🔵 BLUE per Phase 2 tagging)
# =============================================================================

# --- VMM platform ---
type VMM_BusinessPartner @key(fields: "bpId") @extends {                # 🔜
  bpId: ID! @external
}
type VMM_Brand @key(fields: "brandId") @extends {                       # 🔜
  brandId: ID! @external
}

# --- IG (Item Groups) platform ---
type IG_Department @key(fields: "id") @extends { id: ID! @external }    # 🔜
type IG_Division   @key(fields: "id") @extends { id: ID! @external }    # 🔜
type IG_Clazz      @key(fields: "id") @extends { id: ID! @external }    # 🔜
# IG_Clazz_Filter is a polymorphic projection used by SPARK_Categories;
# kept as gateway-stitched stub to preserve current __resolveType default branch.
type IG_Clazz_Filter @key(fields: "id") @extends { id: ID! @external }  # 🔜

# --- Doppler platform ---
type DopplerCapacityType @key(fields: "id") @extends { id: ID! @external }  # 🔜

# --- Corona platform (item master) ---
type CORONA_ItemDetails @key(fields: "tcinId") @extends {               # 🔜
  tcinId: ID! @external
}

# --- APEX (DPCI / item setup) ---
# No federation key needed today — APEX data is embedded into ReservedDpci value
# objects on Product. Listed here only for documentation.

# --- Brand Compliance / External Rating ---
# Rating service is fetched server-side via API key; result returned as embedded
# `Rating` value type — no federation stub required.

# --- Co-located sibling DGS subgraphs (same `plm-product` DGS, distinct subgraphs) ---
type Attachment      @key(fields: "id") @extends { id: ID! @external }      # 🔜 attachment subgraph
type SampleV2        @key(fields: "id") @extends { id: ID! @external }      # 🔜 sample subgraph
type Tag             @key(fields: "id") @extends { id: ID! @external }      # 🔜 tag subgraph
type WorkspaceV2     @key(fields: "id") @extends { id: ID! @external }      # 🔜 workspace subgraph
type TeamV2          @key(fields: "teamId") @extends { teamId: ID! @external }  # 🔜 team subgraph
type UserProfileAttributes @key(fields: "id") @extends { id: ID! @external }    # 🔜 user-profile subgraph
type Discussion      @key(fields: "discussionId") @extends { discussionId: ID! @external }  # 🔜 discussion subgraph
type DiscussionThread @key(fields: "discussionThreadId") @extends { discussionThreadId: ID! @external }  # 🔜
type FileLibrary     @key(fields: "id") @extends { id: ID! @external }      # 🔜 file-library subgraph
type Bom             @key(fields: "id") @extends { id: ID! @external }      # 🔜 bom subgraph
type Claim           @key(fields: "id") @extends { id: ID! @external }      # 🔜 claim subgraph
type Measurement     @key(fields: "id") @extends { id: ID! @external }      # 🔜 measurement subgraph
type ProductDetail   @key(fields: "id") @extends { id: ID! @external }      # 🔜 product-detail subgraph
type Packaging       @key(fields: "id") @extends { id: ID! @external }      # 🔜 packaging subgraph
type ProductAsk      @key(fields: "id") @extends { id: ID! @external }      # 🔜 product-ask subgraph
type ProductVariation @key(fields: "id") @extends { id: ID! @external }     # 🔜 product-variation subgraph

# =============================================================================
# 2. OWNED ENTITY — `Product`
# =============================================================================

type Product @key(fields: "id") {                                       # 🔜
  # --- Identity & lifecycle ---
  id: ID
  humanId: String
  type: Int                    # 100=Product, 101=Template, 102=BrandCompliance
  owningPartnerType: Int
  createdAt: DateTime!
  createdBy: UserProfileAttributes
  updatedAt: DateTime!
  updatedBy: UserProfileAttributes
  versionCreatedAt: DateTime
  versionCreatedBy: UserProfileAttributes
  version: Int

  # --- Core descriptive ---
  description: String
  comments: String
  internalNotes: String
  vendorStyleNumber: String
  primaryMaterial: String
  secondaryMaterial: String
  thumbnailId: String
  brandComplianceRecordId: String
  parentProductId: String
  copyId: String
  copyProductRequest: String
  presentationDimensions: String
  presentationHeight: String
  presentationWidth: String
  presentationDepth: String
  numberOfPieces: Int
  developmentCost: String
  archived: Boolean
  movable: Boolean
  editable: Boolean
  preferredStyle: Boolean
  fbDpci: String

  # --- Status ---
  status(workspaceIdFilter: String, partnerIdFilter: String): ProductStatus

  # --- Partner / team ---
  vendorAttributes(workspaceIdFilter: String): [ProductVendorAttributes]
  businessPartners(workspaceIdFilter: String): [VMM_BusinessPartner]
  droppedPartners: [VMM_BusinessPartner]
  notRemovablePartnerIds: [ID]
  droppedPartnerIds: [ID]
  designPartnerId: [ID]
  unDroppablePartners(isDesignPartner: Boolean): [ID]

  # --- Workspace ---
  productWorkspaceAttributes(elasticVerify: Boolean): [ProductWorkspaceAttributes]
  productWorkspaceInfo: [ProductWorkspaceInfo]
  notRemovableWorkspaceIds: [String]
  workspaces: WorkspacesPagedV2

  # --- Teams ---
  teams(partnerId: String, workspaceId: String): TeamPaged
  teamsV2: TeamPagedV2

  # --- Hierarchy lookups (gateway-stitched) ---
  department:  IG_Department
  departments: [DopplerDepartment]
  division:    IG_Division
  # NOTE: source resolver `division` currently calls the *department* loader.
  # The DGS port wires this through DivisionService; behavior parity is verified
  # via contract tests (the latent bug is fixed during migration).
  clazz:  IG_Clazz
  brand:  VMM_Brand
  brands: [VMM_Brand]
  divisions: [IG_Division]

  # --- Attachments ---
  attachments: [Attachment]
  attachmentsWithMetaData: [AttachmentWithMetaData]
  attachmentsV3(partnerId: ID, type: String, tags: [String], onlyProductPacketFiles: Boolean): SearchAttachmentsPaged
  attachmentSummary: AttachmentSummary

  # --- Samples ---
  samples: [SampleV2]
  sampleIds: [ID]
  elasticSamplesList(query: String, page: Int, size: Int): SearchSamplesPaged
  hasSamplesUpcomingDue: Boolean
  hasNotEvaluatedReceivedSamples: Boolean
  receivedNotEvaluatedCount: Int

  # --- Components (co-located domains) ---
  measurementSets(calculated: Boolean, includeMeasurements: Boolean): MeasurementsPaged
  claims(partnerIds: [String], includeClaims: Boolean): [Claim]
  bom(includeBoms: Boolean): BomPaged
  productBom(includeBoms: Boolean): BomPaged
  packagingBom(includeBoms: Boolean): BomPaged
  components(workspaceId: String, partnerId: ID, type: String, tags: [String], archived: Boolean, types: [Int]): SearchComponentsPaged

  # --- Discussion ---
  discussionsCount: Int
  discussionsV2(partnerId: ID): DiscussionElastic

  # --- Tags ---
  tags: [Tag]

  # --- TCIN / DPCI ---
  tcins: [PartnerTcins]
  reservedDpcis: [PartnerReservedDpci]
  parentTcins: [String]
  rating: Rating

  # --- Relationships ---
  ancestryProducts: [AncestryProducts]
  childProducts: [ChildProducts]
  copyProductResources: [ProductCopyResources]

  # --- Template-only (type=101) ---
  productTemplateDepartments: [IG_Department]
  productTemplateStatus: ProductTemplateStatus
  attachmentsData: ProductTemplateAttachments
  productComponentsCounts: [ProductComponentsCounts]
  productMaterials: [ProductMaterials]
  packagingAttributes: [PackagingAttribute]

  # --- Cross-domain (gateway-stitched) ---
  variations(partnerId: String, workspaceId: String): [ProductVariation]
  associateProductsAsks(workspaceIdFilter: String): [ProductAsk]
}

# =============================================================================
# 3. COMPOSITE-KEY ENTITY — `ResourcesCount` (TechPack rollup)
# =============================================================================
# Per reference/federation-patterns.md §9: Product subgraph defines the type
# and stub resolvers; each owning subgraph extends with @requires.
# =============================================================================

type ResourcesCount @key(fields: "productId partnerId") {               # 🔜
  productId: ID!
  partnerId: ID!
  workspaceContext: String
  parentProductId: ID
  productThumbnailId: String

  # Stub fields — Product returns null; owning subgraphs fill these in.
  productAttachments:    [ID]   # → attachment subgraph
  discussionAttachments: [ID]   # → attachment subgraph
  discussions:           [ID]   # → discussion subgraph
  sample:                [ID]   # → sample subgraph
  measurementSets:       [ID]   # → measurement subgraph
  claims:                [ID]   # → claim subgraph
  productBoms:           [ID]   # → bom subgraph
  packagingBoms:         [ID]   # → bom subgraph
  boms:                  [ID]   # → bom subgraph (legacy combined)
  constructions:         [ID]   # → construction subgraph
  watchlists:            [ID]   # → watchlist subgraph
}

