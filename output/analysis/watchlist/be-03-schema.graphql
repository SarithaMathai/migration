# =============================================================================
# Watchlist Domain — Federated Target DGS Schema (translated from source SDL)
# Pipeline Version: 2.0 · Generated: 2026-06-27
# DGS Target: Green-field → plm-product subgraph (co-located)
# Source:    code/schemas/SPARK_Watchlist.txt (the real SDL) + code/resolvers/product/SPARK_Watchlist.txt (behaviour)
# Target:    plm-product/apps/app/src/main/resources/schema/watchlist.graphqls
# This is the FEDERATED TARGET schema, translated from the SDL (SPARK_ prefix dropped, @key added).
# Nullability/return-types from the SDL (verified against the resolver). Entity keyed on humanId (no id).
# Status: 🔜 all need migration.
# =============================================================================

extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.3", import: ["@key", "@extends", "@external", "@shareable"])

scalar DateTime

# --- Type references ---
# INTERNAL (same plm-product subgraph; @extends @external is a standalone-compile placeholder):
type Product @extends @key(fields: "id") { id: ID! @external }
# True federation stubs (separate DGS subgraphs + platform):
type VMM_BusinessPartner @extends @key(fields: "id") { id: ID! @external }
type Attachment @extends @key(fields: "id") { id: ID! @external }
type SearchAttachment @extends @key(fields: "id") { id: ID! @external }          # search subgraph
type WorkspaceV2 @extends @key(fields: "id") { id: ID! @external }
type UserProfileAttributes @extends @key(fields: "id") { id: ID! @external }
type UserGroup_Participants @extends @key(fields: "id") { id: ID! @external }

# --- Shared value types ---
type CodeDescription @shareable { code: Int, description: String }

# --- Owned entity: a watchlist entry ---
type Watchlist @key(fields: "humanId") {
  humanId: String!                # @key — SDL exposes no `id`
  parentId: String!
  workspaceContext: String
  businessPartners: [WatchlistPartner]
  statusId: Int                   # computed from status.code
  statusName: String              # computed from status.description
  reasonIds: [Int]                # computed from reasons[].code
  reasons: [String!]              # computed from reasons[].description
  otherReason: String
  notes: String
  inspections: [WatchlistInspection]
  version: Int
  # field resolvers ↓
  attachments: [SearchAttachment]
  workspaces: [WorkspaceV2]
  product: Product                # only when parentId starts with 'PID'
  participantDetails: UserGroup_Participants
  createdBy: UserProfileAttributes
  updatedBy: UserProfileAttributes
  createdAt: DateTime
  updatedAt: DateTime
}

type WatchlistPartner {
  partnerId: ID
  partnerName: String             # field resolver → VMM bpName
  partnerType: Int
  systemTeamId: String
}

type WatchlistInspection {
  id: String
  actionId: Int                   # computed from action.code
  action: String!                 # computed from action.description
  type: String
  instructions: String
}

type WatchlistInspectionAction {
  code: Int!
  description: String!
  types: [String!]!
}

# --- Inputs ---
input WatchlistInput {
  humanId: String
  parentId: String!
  workspaceContext: String
  businessPartners: [WatchlistPartnerInput]
  statusId: Int
  reasonIds: [Int]
  otherReason: String
  notes: String
  inspections: [WatchlistInspectionInput]
  attachmentIds: [String!]
  removedAttachmentIds: [String!]
  participantDetails: UserGroup_ParticipantsInput
  relatedResources: [String!]
}

input WatchlistPartnerInput { partnerId: ID, partnerType: Int, systemTeamId: String }
input WatchlistInspectionInput { id: String, actionId: Int, type: String, instructions: String, attachmentIds: [String!] }
input WatchlistAttachmentCloneRef { relatedResources: [String], context: String }
input UserGroup_ParticipantsInput { _placeholder: String }

# --- Queries (names + nullability preserved from the SDL) ---
extend type Query {
  getWatchlistReasons: [CodeDescription]                                                       # 🔜 B-02 (cacheable)
  getWatchlistInspectionActions: [WatchlistInspectionAction]                                   # 🔜 B-03 (cacheable)
  getWatchlistByIds(ids: [String!]): [Watchlist]                                               # 🔜 B-01
  getWatchlistByFilter(q: String, filter: [String], workspaceId: ID!, page: Int = 0, size: Int = 100): [Watchlist]   # 🔜 C-01 (🔴 search; product→search→watchlist)
}

# --- Mutations (names + nullability preserved from the SDL) ---
extend type Mutation {
  createWatchlistEntries(watchlistEntries: [WatchlistInput!]!): [Watchlist]                     # 🔜 D-01 (create + user-group; throws)
  cloneFilesForWatchlist(attachmentIds: [String], cloneReference: [WatchlistAttachmentCloneRef]): [Attachment]   # 🔜 D-02 (🔴 attachment)
  updateWatchlistEntries(watchlistEntries: [WatchlistInput!]!): [Watchlist]                     # 🔜 E-01 (multi-step, non-atomic; await bug)
}

# --- Federation: Watchlist contributes to Product + TechPack (Phase F — INTERNAL, same subgraph) ---
# Co-located: Product.watchlists and ResourcesCount.watchlists resolve in-process (CAT-2), NOT gateway
# federation. This is the watchlist side of product's TechPack count — analogous to bom F-06 / measurement F-04.
# (Product's PRODUCT-BE-F-08 should be reclassified internal; see 01 §5.)
# extend type Product { id: ID!  watchlists: [Watchlist] }         # F-01 (internal)
# extend type ResourcesCount { productId: ID!  partnerId: ID!  watchlists: [ID] }   # F-02 (internal)
