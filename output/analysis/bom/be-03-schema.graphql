# =============================================================================
# BOM Domain — Federated Target DGS Schema (translated from source SDL)
# Generated: 2026-06-26
# DGS Target: Green-field → plm-product subgraph
# Source:    code/schemas/SPARK_Bom.txt (the real SDL) + code/resolvers/product/SPARK_Bom.txt (behaviour)
# Target:    plm-product/apps/app/src/main/resources/schema/bom.graphqls
#
# This is the FEDERATED TARGET schema, translated from the source SDL (SPARK_ prefix dropped, @key added).
# Nullability/return-types are taken from the SDL (verified against the resolver). `Bom.id`
# is backed by the record's `id` (the SDL type exposes `humanId`; the resolver falls back `humanId || id`).
#
# Status Legend:  ✅ Exists in DGS  |  🔜 Needs migration (all below)  |  ⏭ Deferred
# =============================================================================

extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.3"
    import: ["@key", "@extends", "@external", "@shareable", "@requires"]
  )

scalar DateTime

# =============================================================================
# 1. EXTERNAL STUBS — gateway-stitched platforms (🔵 never migrated to DGS)
# =============================================================================

type VMM_BusinessPartner @extends @key(fields: "id") { id: ID! @external }

# =============================================================================
# 2a. INTERNAL co-located types (SAME plm-product subgraph — monorepo)
# `Product` and `ProductComponentStatus` are owned by the `product`/component code in the SAME
# subgraph. They are NOT federation stubs — the `@extends @external` here is a compile placeholder
# so bom.graphqls validates standalone; in the merged plm-product schema they are plain internal
# types and `Bom.product` is an in-process @DgsData call. See 03-schema-analysis.md §4.
# =============================================================================

type Product @extends @key(fields: "id") { id: ID! @external }            # INTERNAL (same subgraph) — placeholder only

# =============================================================================
# 2b. EXTERNAL STUBS — separate DGS subgraphs (🔜 truly federated)
# workspace, user-profile, tag, access-control, and the material DGSs (hub/trim/wash/fabric/combination).
# =============================================================================
type WorkspaceV2 @extends @key(fields: "id") { id: ID! @external }
type UserProfileAttributes @extends @key(fields: "id") { id: ID! @external }
type Tag @extends @key(fields: "id") { id: ID! @external }
type UserGroup_Participants @extends @key(fields: "id") { id: ID! @external }
type ResourcePermissions @extends @key(fields: "id") { id: ID! @external }
type AccessControl @extends @key(fields: "id") { id: ID! @external }
type ProductComponentStatus @extends @key(fields: "id") { id: ID! @external }

# Material-library cross-domain (material-hub / trim / wash / fabric / combination DGSs)
type HubMaterialInterface @extends @key(fields: "id") { id: ID! @external }
type Material @extends @key(fields: "id") { id: ID! @external }
type FabricSpecCombo @extends @key(fields: "id") { id: ID! @external }
type FabricSpecification @extends @key(fields: "id") { id: ID! @external }
type Fabric @extends @key(fields: "id") { id: ID! @external }
type Trim @extends @key(fields: "id") { id: ID! @external }
type Wash @extends @key(fields: "id") { id: ID! @external }
type Combination @extends @key(fields: "id") { id: ID! @external }
type BaseMaterial @extends @key(fields: "id") { id: ID! @external }
type MaterialsPaged @extends @key(fields: "id") { id: ID! @external }
type TrimColorRow @extends @key(fields: "id") { id: ID! @external }
type TrimFinishRow @extends @key(fields: "id") { id: ID! @external }
type TrimSize @extends @key(fields: "id") { id: ID! @external }
type TrimSupplier @extends @key(fields: "id") { id: ID! @external }
type MaterialOrigin @extends @key(fields: "id") { id: ID! @external }
type UnitOfMeasure @extends @key(fields: "id") { id: ID! @external }

# =============================================================================
# 3. SHARED VALUE TYPES (@shareable)
# =============================================================================

type CodeDescription @shareable { code: Int, description: String }
type UnitsOfMeasure @shareable { code: Int, description: String }
type Paging @shareable { totalElements: Int, totalPages: Int, number: Int, size: Int }
type ValueWithUnit @shareable { value: Float, unitOfMeasure: UnitOfMeasure }

# =============================================================================
# 4. OWNED TYPES — Bom + materials  (🔜 all need migration)
# =============================================================================

type Bom @key(fields: "id") {
  id: ID!
  humanId: String
  parentId: String
  product: Product
  name: String
  notes: String
  status: CodeDescription
  statuses: [ProductComponentStatus]
  createdAt: DateTime
  createdBy: UserProfileAttributes
  updatedAt: DateTime
  updatedBy: UserProfileAttributes
  access: AccessControl
  businessPartners: [VMM_BusinessPartner]
  currentUserPermissions: ResourcePermissions
  groupMode: CodeDescription
  sections: [BomSection]
  materials: [BomMaterialInterface]
  workspaces: [WorkspaceV2]
  workspaceContext: [ID]
  libraryLinked: Boolean
  manualLock: Boolean
  version: Int
  participantDetails: UserGroup_Participants
  selectedProductImpressionIds: [String]
  archived: Boolean
  bomType: Int
  type: CodeDescription
  bomBaseType: Bom_Type
}

type BomPaged { content: [Bom] }
type Bom_Type { type: Int }
type BomSection { id: String, description: String }

# Bom_Unified (parallel projection of Bom) is DEPRECATED — decision: use field selection on `Bom`
# instead of a second type. Removed together with BomMaterial_Unified and BomMaterial_Library_Unified.
# See bom/04-stories.md Phase 0 decision #3.

