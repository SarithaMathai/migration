# =============================================================================
# Discussion Domain — Federated Target DGS Schema (translated from source SDLs)
# Pipeline Version: 2.0 · Generated: 2026-06-27
# DGS Target: Green-field → SEPARATE `plm-discussion` subgraph (own backend; v1/v2/V3)
# Source:    code/schemas/SPARK_Discussion.txt + SPARK_DiscussionV3.txt (the real SDLs) + resolvers (behaviour)
# Target:    plm-discussion/apps/app/src/main/resources/schema/discussion.graphqls
# This is the FEDERATED TARGET schema, translated from both SDLs (SPARK_ prefix dropped, @key added).
# Nullability from the SDLs. Discussion is its OWN subgraph: search/attachment/user/vmm/tag are cross-subgraph.
# `Resource` is a polymorphic union → @DgsTypeResolver. `core*` mutations are system-context twins.
# Status: 🔜 all need migration.
# =============================================================================

extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.3", import: ["@key", "@extends", "@external", "@shareable"])

scalar DateTime

# --- External stubs (all cross-subgraph) ---
type SearchAttachment @extends @key(fields: "id") { id: ID! @external }
type Attachment @extends @key(fields: "id") { id: ID! @external }
type UserProfileAttributes @extends @key(fields: "id") { id: ID! @external }
type UserGroup_Participants @extends @key(fields: "id") { id: ID! @external }
type VMM_BusinessPartner @extends @key(fields: "id") { id: ID! @external }
type Tag @extends @key(fields: "id") { id: ID! @external }
type DiscussionElastic @extends @key(fields: "id") { id: ID! @external }        # search projection
# Resource union members (the discussion's parent — owned by other subgraphs):
type Product @extends @key(fields: "id") { id: ID! @external }
type SampleV2 @extends @key(fields: "id") { id: ID! @external }
type WorkspaceV2 @extends @key(fields: "id") { id: ID! @external }

# --- Shared value types ---
type ResourceCount @shareable { resourceId: String, count: Int }

# --- Polymorphism: the discussion's parent resource (→ @DgsTypeResolver by id prefix) ---
union Resource = Product | SampleV2 | WorkspaceV2

# --- Owned entity: a discussion ---
type Discussion @key(fields: "discussionId") {
  discussionId: String!
  discussionThreadId: String
  subject: String
  content: DiscussionContent
  resourceId: String
  resourceType: String
  resource: Resource                  # union (__resolveType)
  partnerId: ID
  critical: Boolean
  draft: Boolean
  editable: Boolean
  tags: [Tag]
  participants: Discussion_Participants
  replies: [DiscussionReply]
  attachments: [Attachment]
  createdAt: DateTime
  createdBy: UserProfileAttributes
  updatedAt: DateTime
  updatedBy: UserProfileAttributes
}

type FullDiscussion {
  discussionId: String
  subject: String
  content: DiscussionContent
  participants: Discussion_Participants
  replies: [DiscussionReply]
  resource: Resource
}
type DiscussionContent { text: String, html: String }
type DiscussionReply {
  discussionThreadId: String
  discussionId: String
  message: String
  critical: Boolean
  editable: Boolean
  attachments: [Attachment]
  createdAt: DateTime
  createdBy: UserProfileAttributes
  notificationStatus: NotificationStatus
}
type NotificationStatus { status: String, sentAt: String }
type Discussion_Participants { teams: [Discussion_Team], users: [Discussion_Participant] }
type Discussion_Team { teamId: ID, businessPartnerId: ID, businessPartner: VMM_BusinessPartner }
type Discussion_Participant { userId: ID, userDetails: UserProfileAttributes }
type SampleDiscussion { discussionId: String, sampleId: String, resourceId: String }
type DiscussionElasticPaged { content: [Discussion], paging: JsonNode }
type UnsentDiscussions { content: [Discussion], count: Int }
type VersionedDiscussion { discussionId: String, version: Int, updatedBy: UserProfileAttributes, updatedAt: String }
type VersionedDiscussionThread { discussionThreadId: String, discussionId: String, version: Int, updatedBy: UserProfileAttributes, updatedAt: String }
type DiscussionReadByUsers { discussions: [JsonNode], discussionThreads: [JsonNode] }
type BulkDiscussionOutputV3 { discussions: [Discussion] }
scalar JsonNode
# NOTE: a few more SDL value/detail types carry 1:1 from the source SDLs (prefix dropped) — expand in A02.

# --- Inputs (key; remaining carry from the SDLs) ---
input DiscussionInput { resourceId: String, resourceType: String, subject: String, content: String, partnerId: ID, participants: ParticipantsInput }
input DiscussionInputV3 { discussionId: ID, discussionThreadId: String, attachmentId: [String], resourceId: String, resourceType: String, subject: String, content: String, participants: ParticipantsInput }
input BulkDiscussionInputV3 { discussionDtoList: [DiscussionInputV3] }
input UpdateDiscussionInput { subject: String, content: String, tags: [ID] }
input UpdateDiscussionInputV3 { subject: String, content: String, tags: [ID] }
input DiscussionReplyInput { discussionId: ID!, message: String, critical: Boolean }
input SampleDiscussionInput { sampleId: String, resourceId: String, subject: String, content: String }
input AddParticipantInput { teams: [String], users: [String], partnerIds: [ID] }
input ParticipantsInput { teams: [String], users: [String] }
input DiscussionAsCritical { discussionId: ID, discussionThreadId: String, value: Boolean, tagId: ID }
input BulkAttachmentInput { documentId: String, resource: JsonNode, relatedResources: [String] }
input BulkDiscussionAttachCloneRef { resourceId: String, businessPartner: ProductPartnerInput, relatedResources: [String] }
input ProductPartnerInput { partnerId: ID!, partnerType: Int }

# --- Queries (names + nullability preserved from the SDLs) ---
extend type Query {
  getDiscussionV2(id: ID!): FullDiscussion                                                          # B01
  coreGetDiscussionV2(id: ID!): FullDiscussion                                                      # B01 (system context)
  getDiscussionByIdsV2(ids: [String]): [FullDiscussion]                                             # B02
  getDiscussionsCount(resourceId: String!, resourceType: String!): [ResourceCount]                  # B03
  getDiscussionOnResource(resourceId: String!): [Discussion]                                        # B04
  getDiscussionsByThread(id: ID!): [Discussion]                                                     # B05
  getUnsentDiscussions: UnsentDiscussions                                                           # B06
  getVersionedDiscussions(id: ID!): [VersionedDiscussion]                                           # B07 (V3)
  getVersionedDiscussionThreads(id: ID!): [VersionedDiscussionThread]                               # B07 (V3)
  getDiscussionsV2(resourceId: String!, resourceType: String!, partnerId: ID): DiscussionElastic    # C01 (🔴 search)
  getSampleDiscussion(resourceId: String!, resourceType: String!, partnerId: ID): [Discussion]      # C02
}

# --- Mutations (names + nullability preserved from the SDLs) ---
extend type Mutation {
  addDiscussionV2(sparkDiscussion: DiscussionInput!, attachments: [BulkAttachmentInput]): Discussion              # D01
  addDiscussionV3(sparkDiscussion: DiscussionInputV3!, attachments: [BulkAttachmentInput]): Discussion            # D11
  coreAddDiscussionV3(sparkDiscussion: DiscussionInputV3!, attachments: [BulkAttachmentInput]): Discussion        # D11 (system)
  addBulkDiscussionV3(sparkDiscussions: BulkDiscussionInputV3!, attachments: [BulkAttachmentInput]): BulkDiscussionOutputV3  # D12
  addDiscussionReplyV2(sparkDiscussionReply: DiscussionReplyInput!, attachments: [BulkAttachmentInput], isAttachmentsV3: Boolean = false): DiscussionReply  # D02
  updateDiscussionReplyV2(sparkDiscussionReply: DiscussionReplyInput!, attachments: [BulkAttachmentInput], isAttachmentsV3: Boolean = false): DiscussionReply  # D02
  updateDiscussionV2(id: ID!, sparkDiscussion: UpdateDiscussionInput): Discussion                   # D03
  updateDiscussionV3(id: ID!, sparkDiscussion: UpdateDiscussionInputV3): Discussion                 # D13
  coreUpdateDiscussionV3(id: ID!, sparkDiscussion: UpdateDiscussionInputV3): Discussion             # D13 (system)
  deleteDiscussionV2(resourceId: ID, id: ID!): ID                                                   # D04
  deleteDiscussionReplyV2(id: ID!, replyId: ID!): ID                                                # D05
  deleteDiscussionPartnersV2(id: ID, partnerIds: [Int]): ID                                         # D06
  addSampleDiscussionV2(sparkSampleDiscussion: DiscussionInput!): SampleDiscussion                  # D07
  addSampleDiscussionV3(sparkSampleDiscussion: SampleDiscussionInput!): SampleDiscussion            # D07
  bulkAddSampleDiscussions(sparkBulkSampleDiscussion: [SampleDiscussionInput]): [SampleDiscussion]  # D07
  updateAsCritical(criticalObject: DiscussionAsCritical): DiscussionReply                           # D08
  updateDiscussionEditable(discussionEditableObject: DiscussionAsCritical): DiscussionReply         # D08
  updateTagExisting(tagUpdateObject: DiscussionAsCritical): DiscussionReply                         # D08
  cloneFilesForBulkDiscussion(attachmentIds: [String], cloneReferences: [BulkDiscussionAttachCloneRef]): [Attachment]  # D09 (🟡 attachment)
  discussionReadByUsers(discussionIds: [String], discussionThreadIds: [String], readByUserList: [String]): DiscussionReadByUsers  # D10
  updateParticipantsV2(id: ID!, participants: AddParticipantInput): Discussion                      # E01
  deleteParticipantV2(id: ID!, teamId: ID!, userId: ID, partnerId: ID): Discussion                  # E01
  updateParticipantsV3(id: ID!, participants: ParticipantsInput): Discussion                        # E02
  coreUpdateParticipantsV3(id: ID!, participants: ParticipantsInput, relatedResources: [String], resourceType: String): Discussion  # E02
  coreDeleteParticipantsV3(id: ID!, participants: ParticipantsInput, relatedResources: [String], resourceType: String, removedUserId: ID, teamId: ID, removedPartnerIds: [ID], removedDesignPartnerIds: [ID]): Discussion  # E02
  deleteParticipantV3(id: ID!, teamId: ID, userId: ID, partnerId: ID, designPartnerId: ID): Discussion  # E02

  # --- Schema-drift: declared in the SDLs, no top-level resolver. ---
  dropPartnerFromDiscussionIds(ids: [ID!], partnerIds: [ID!]): Discussion    @deprecated(reason: "service method — driven by workspaceBusinessPartnerActionsV2")  # ⏭
  unDropPartnerFromDiscussionIds(ids: [ID!], partnerIds: [ID!]): Discussion  @deprecated(reason: "service method — driven by workspaceBusinessPartnerActionsV2")  # ⏭
  coreAddBulkDiscussionV3(sparkDiscussions: BulkDiscussionInputV3!, attachments: [BulkAttachmentInput]): BulkDiscussionOutputV3  @deprecated(reason: "no resolver in snapshot — confirm")  # ⏭
}

# --- Federation: discussion provides discussionsCount/discussionsV2 for product/workspace and the TechPack
#     ResourcesCount.discussions count (SPARK-PROD-F02). Discussion is referenced as an entity by id. ---
