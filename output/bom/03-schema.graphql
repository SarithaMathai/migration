# =============================================================================
# 6. QUERIES
# =============================================================================

extend type Query {
  getBomByIds(ids: [String!]): [Bom]
  getBomDataV2(ids: [String!]): [Bom_Unified]
  getBomStatus: [CodeDescription]
  getBomByParentId(parentId: String!): BomPaged
  getBomMaterialTypes(ids: [String]): [BomMaterialType]
  getBomPackagingMaterialTypes: [BomMaterialType]
  getBomPackagingSubstrates: [BomPackagingSubstrate]
  getBomPackagingUnitOfMeasure: [UnitsOfMeasure]
  getBomElastic(q: String!): [Bom]
  searchMaterialsBom(
    searchString: String
    materialType: String
    partnerIds: [ID]
    internalOnly: Boolean
    excludedTypes: [String]
    size: Int = 20
    sortField: String
    sortDirection: SortDirection
    nestedSearchFilters: [MaterialNestedSearchFilter]
  ): BomMaterialSearch
  getComboSupplierForBom(comboId: String, partnerIds: [ID]): [BomComboSupplier]
  getValidTrimSuppliersForBom(merchVendorIds: [ID]): [Int]
  getValidRawMaterialSuppliersForBom(merchVendorIds: [ID]): [Int]
}

