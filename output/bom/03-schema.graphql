  lockBom(bomId: String!): Bom
  unlockBom(bomId: String!): Bom
  updateBomComponentStatus(productId: String!, ids: [String], status: ComponentStatusInput): BomPaged
}

# =============================================================================
# 8. FEDERATION: Bom extension on Product (sibling subgraph contribution)
# =============================================================================
# This subgraph contributes the `productBoms`, `boms`, `packagingBoms` field set
# back to the Product entity per federation-patterns.md §9 (multi-subgraph contributions).
# Tracked as Phase F story F01 in 04-stories.md (BLOCKED-BY product domain Phase 3).
#
# extend type Product @key(fields: "id") {
#   id: ID! @external
#   productBoms(includeAttachments: Boolean): [Bom]
#   boms(types: [Int]): [Bom]
#   packagingBoms: [Bom]
# }
