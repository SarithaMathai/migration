extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.3"
    import: ["@key", "@extends", "@external", "@shareable"]
  )

scalar DateTime

# =============================================================================
# External stubs
# =============================================================================
type VMM_BusinessPartner @extends @key(fields: "id") { id: ID! @external }
type Product @extends @key(fields: "id") { id: ID! @external }
type WorkspaceV2 @extends @key(fields: "id") { id: ID! @external }
type UserProfileAttributes @extends @key(fields: "id") { id: ID! @external }

# =============================================================================
# Owned types
# =============================================================================
type Impression @key(fields: "id") {
  id: ID!
  name: String
  parentId: ID
  version: Int
  businessPartners: [VMM_BusinessPartner]
  owningBusinessPartner: VMM_BusinessPartner
  owningPartnerId: ID
  owningPartnerType: Int
  workspaceContext: [ID]
  workspaces: [WorkspaceV2]
  deletable: Boolean
  associatedBomIds: [String]
  attachmentId: String
  relatedResources: [ID]
  sortOrder: Int
  createdAt: DateTime
  createdBy: UserProfileAttributes
  updatedAt: DateTime
  updatedBy: UserProfileAttributes
}

# Restructured count wrapper — replaces source schema-shape mismatch
type ImpressionCountResult {
  productId: ID!
  totalCount: Int!
  countsByPartner: [PartnerImpressionCount!]!
}

type PartnerImpressionCount {
  partnerId: ID!
  count: Int!
}

# Deprecated legacy shape kept for backward compat — to be removed after client migration
type ImpressionCount @deprecated(reason: "Use ImpressionCountResult — see 03-schema-analysis.md") {
  counts: [CountsByBp]
}

type CountsByBp @shareable {
  bpType: String
  counts: Int
}

# =============================================================================
# Inputs
# =============================================================================
input ProductImpressionInput {
  impressionsToDelete: [String]
  impressionsToUpdate: [ImpressionInput]
}

input ImpressionInput {
  id: String
  name: String
  partnerIds: [ID]
  businessPartners: [ProductPartnerInput]
  workspacesToAdd: [String]
  workspacesToRemove: [String]
  attachmentId: String
  relatedResources: [ID]
  sortOrder: Int
}

input ProductPartnerInput {
  partnerId: ID
  partnerType: Int
}

# =============================================================================
# Queries / Mutations
# =============================================================================
extend type Query {
  searchImpressionsByProductId(
    id: ID!
    partnerIds: [ID]
    workspaceIds: [ID]
    enableWorkspaceContextFiltering: Boolean
  ): [Impression]

  getImpressionCountsByProductId(id: ID!): ImpressionCountResult
}

extend type Mutation {
  updateImpressions(
    productId: ID!
    productImpression: ProductImpressionInput!
  ): [Impression]
}

