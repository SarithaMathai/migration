# =============================================================================
# Search Domain — Federated Target DGS Schema (translated from source SDL)
# Pipeline Version: 2.0 · Generated: 2026-06-27
# DGS Target: Green-field → SEPARATE `plm-elastic-search` subgraph (elastic-backed)
# Source:    code/schemas/SPARK_Search.txt (the real SDL, 655 lines) + code/resolvers/SPARK_Search.txt (behaviour)
# Target:    plm-elastic-search/apps/app/src/main/resources/schema/search.graphqls
# This is the FEDERATED TARGET schema, translated from the SDL (SPARK_ prefix dropped, @key added on
# entities). Nullability/return-types from the SDL. The full ~48 queries + 1 mutation are below; the ~50
# result/value types carry across 1:1 from the SDL (prefix dropped) — the principal enriched types are
# shown here, the remaining value types are noted at the end.
