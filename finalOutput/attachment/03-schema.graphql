# =============================================================================
# Attachment Domain — Federated Target DGS Schema (translated from source SDL)
# Pipeline Version: 2.0 · Generated: 2026-06-27
# DGS Target: Green-field → SEPARATE `plm-attachment` subgraph (own backend)
# Source:    code/schemas/SPARK_Attachment.txt (the real SDL) + code/resolvers/SPARK_Attachment.txt (behaviour)
# Target:    plm-attachment/apps/app/src/main/resources/schema/attachment.graphqls
# This is the FEDERATED TARGET schema, translated from the SDL (SPARK_ prefix dropped, @key added).
# Nullability from the SDL. Attachment is its OWN subgraph: search/relationship/vmm/tag/user/gallery are
# cross-subgraph. NOTE: the source serves attachments in two record shapes (elastic snake_case vs api
# camelCase) — normalize at the DTO boundary so these schema fields are clean.
# Status: 🔜 all need migration.
# =============================================================================

extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.3", import: ["@key", "@extends", "@external", "@shareable"])

scalar DateTime

# --- External stubs (all cross-subgraph) ---
type SearchAttachment @extends @key(fields: "id") { id: ID! @external }          # search subgraph
type UserProfileAttributes @extends @key(fields: "id") { id: ID! @external }
type VMM_BusinessPartner @extends @key(fields: "id") { id: ID! @external }
type Tag @extends @key(fields: "id") { id: ID! @external }
type AccessControl @extends @key(fields: "id") { id: ID! @external }
type ResourceMapping @extends @key(fields: "id") { id: ID! @external }
type SingleResourceMapping @extends @key(fields: "id") { id: ID! @external }

# --- Owned entity: an attachment ---
type Attachment @key(fields: "id") {
  id: ID!                          # derived: human_id || humanId || document_id || documentId
  documentId: ID
  humanId: ID
  attachmentId: ID                 # = id
  resource: SingleResourceMapping
  documentName: String
  documentType: String
  mediaType: String
  documentSize: Float
  versionNumber: Int
  sharedWithGallery: Boolean
  canShareWithGallery: Boolean
  attachmentCanShowdog: Boolean
  canOpenInShowDog: Boolean
  finalVirtualFile: Boolean
  previewable: Boolean
  parentResource: String
  relatedResources: [String]
  resources: ResourceMapping
  relationshipMetadata: String
  tcins: [String]
  businessPartners: [String]
  productPacketProps: [ProductPacketProps]
  modelFile: ThreeDFile
  createdAt: DateTime
  updatedAt: DateTime
  # field resolvers ↓
  access: AccessControl
  businessPartnersFull: [VMM_BusinessPartner]
  createdBy: UserProfileAttributes
  updatedBy: UserProfileAttributes
  tags: [Tag]
  galleryDetails: GalleryDetails
}

type ProductPacketProps { partnerId: ID, critical: Boolean }
type ThreeDFile { fileId: String, fileName: String }   # SPARK_3d_File
type GalleryAttachment { attachmentId: String, renders: [GalleryRender], relatedFiles: [GalleryFile] }
type GalleryRender { fileId: String, fileName: String, renderType: String, presignedUrl: String, primary: Boolean }
type GalleryFile { fileId: String, fileName: String, presignedUrl: String, canOpenInShowDog: Boolean }
type GalleryValidations { name: String, value: String, description: String, message: String, classification: String, isInternal: Boolean, validationType: String }
type GalleryDetails {
  assetId: String  transcoded: Boolean  published: Boolean  publishedAt: String
  publishedBy: UserProfileAttributes  fileValid: Boolean  validations: [GalleryValidations]
  fileTypes: [String]    # field resolver → gallery.getAssetFiles
}
type CopyAttachment { thumbnailId: String!, attachments: [Attachment] }
type AttachmentAccess { attachmentAccessId: ID, attachmentId: ID, partnerId: ID, viewable: Boolean }

# --- Inputs ---
input CopyAttachmentInputV3 { thumbnailId: String, humanIds: [ID]! }
input AssociateResourceAttachmentInput { humanIds: [String]!, parentId: String, relatedResourceIds: [String] }
input BulkAttachmentTagsInput { addTagIds: [String], id: String, removeTagIds: [String] }
input BulkAttachmentPermissionsInput { addAcl: [JSON], deleteAcl: [JSON], revokePartners: JSON, lockedIds: [String], unlockedIds: [String] }
input AttachmentAttributesUpdateInput { documentId: String, humanId: String, productPacketProps: [AttachmentProductPacketInput], finalVirtualFile: Boolean }
input AttachmentProductPacketInput { partnerId: ID, critical: Boolean }
input BulkAttributesUpdateInput { attachments: [AttachmentAttributesUpdateInput] }
input ManagePermissionsRequest { partnersToAdd: [PartnerWithType], partnersToDelete: [PartnerWithType], resourceId: ID, locked: Boolean, globalMvAccess: Boolean }
input PartnerWithType { partnerId: ID, partnerType: Int }
input UpdateAttachmentV2 { documentId: ID, tags: [String], productPacketProps: [AttachmentProductPacketInput], managePermissionsRequest: ManagePermissionsRequest, relatedResources: [String] }
input TeamsToUpdateInput { teamsToAdd: [String], teamsToRemove: [String] }
scalar JSON

# --- Queries (names + nullability preserved from the SDL) ---
extend type Query {
  getAttachmentsV3(ids: [ID]): [Attachment]                                                       # B01
  getAttachmentsByResource(resourceId: [ID]): [Attachment]                                         # B02 (🟡 relationship + ACL)
  getAttachmentsByResourceAndOwner(resourceId: [ID]): [Attachment]                                 # B03 (🟡 relationship)
  getRendersForAttachmentIds(ids: [String], betaMode: Boolean = false): [GalleryAttachment] @deprecated(reason: "Use v3")   # B04
  getRendersForAttachmentV3Ids(ids: [String], betaMode: Boolean = false): [GalleryAttachment]      # B04
  getRendersForAttachmentIdsByPost(ids: [String], betaMode: Boolean = false): [GalleryAttachment]  # B04
  getAttachmentsfromRelatedResource(relatedResourceId: ID!, parentResourceId: ID): [SearchAttachment]   # B05 (🔴 search)
  getAttachmentsfromRelatedResources(relatedResourceIds: [ID]!): [SearchAttachment]                # B05 (🔴 search)
  getAttachments(resourceId: ID!, resourceType: String!): [Attachment]! @deprecated(reason: "Use v3 — no resolver in snapshot")  # ⏭ schema-drift
}

# --- Mutations (names + nullability preserved from the SDL) ---
extend type Mutation {
  archiveAttachmentV3(id: ID!): Attachment                                                          # D01
  deleteAttachmentV3(humanId: ID!): String                                                         # D02
  copyAttachmentsV3(attachmentInput: CopyAttachmentInputV3): CopyAttachment                         # D03
  associateResourcesV3(associateAttachmentInput: AssociateResourceAttachmentInput): [Attachment]    # D04
  removeResourcesV3(associateAttachmentInput: AssociateResourceAttachmentInput): [Attachment]       # D05
  updateAttachmentsACLPermissions(partnerId: ID, attachmentIdsForAdmin: [ID], attachmentsIdsForRead: [ID]): AccessControl  # D06 (ACL write)
  updateAttachmentTags(attachmentId: ID, tags: [ID]): Attachment                                    # D07
  updateAttachmentTagsV3(attachmentId: ID, tags: [ID]): Attachment                                  # D07 (identical impl)
  bulkUpdateAttachments(tags: [BulkAttachmentTagsInput], permissions: BulkAttachmentPermissionsInput): [Attachment]   # D08 (fire-and-forget — confirm)
  updateAttributes(attachment: AttachmentAttributesUpdateInput): Attachment                         # D09
  bulkUpdateAttributes(attachments: BulkAttributesUpdateInput): [Attachment]                        # D10
  bulkUpdateAttachmentsV2(attachments: [UpdateAttachmentV2]): [Attachment]                          # D11
  publishAttachmentToGallery(attachmentId: ID!): Boolean                                            # D12 (ATC- branch)
  unpublishAttachmentToGallery(attachmentId: ID!): Boolean                                          # D13 (ATC- branch)
  associateAttachmentTeams(parentId: ID!, files: [String]!, teamsToUpdate: TeamsToUpdateInput!, relatedResourceIds: [String]): [Attachment]  # D14
}

# --- Federation: Attachment is referenced by product/productDetails/packaging/workspace/sample/claims —
#     resolved here by @DgsEntityFetcher on `id`. (search returns a separate SearchAttachment shape.) ---
