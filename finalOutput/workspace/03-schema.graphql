extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.3", import: ["@key", "@extends", "@external", "@shareable"])

scalar DateTime

# --- External stubs (all cross-subgraph) ---
type Product @extends @key(fields: "id") { id: ID! @external }                  # plm-product
type ProductsPaged @extends @key(fields: "id") { id: ID! @external }            # plm-product
type Claims @extends @key(fields: "humanId") { humanId: String! @external }     # claims subgraph
type CombinationSourcePaged @extends @key(fields: "id") { id: ID! @external }   # combination subgraph
type Attachment @extends @key(fields: "id") { id: ID! @external }
type SearchAttachment @extends @key(fields: "id") { id: ID! @external }         # search subgraph
type SearchAttachmentsPaged @extends @key(fields: "id") { id: ID! @external }   # search subgraph
type DiscussionPaged @extends @key(fields: "id") { id: ID! @external }          # discussion subgraph
type DiscussionElastic @extends @key(fields: "id") { id: ID! @external }        # search/discussion
type TeamPaged @extends @key(fields: "id") { id: ID! @external }                # team/search
type UserProfileAttributes @extends @key(fields: "id") { id: ID! @external }
type ResourcePermissions @extends @key(fields: "id") { id: ID! @external }
type ResourceMapping @extends @key(fields: "id") { id: ID! @external }
type VMM_BusinessPartner @extends @key(fields: "id") { id: ID! @external }
type VMM_Brand @extends @key(fields: "brandId") { brandId: ID! @external }
type IG_Division @extends @key(fields: "id") { id: ID! @external }
type IG_Clazz @extends @key(fields: "id") { id: ID! @external }
type IG_Department @extends @key(fields: "id") { id: ID! @external }
type Tag @extends @key(fields: "id") { id: ID! @external }
type Status @extends @key(fields: "id") { id: ID! @external }

# --- Shared value types ---
type CodeDescription @shareable { code: Int, description: String }
type Paging @shareable { totalElements: Int, totalPages: Int, number: Int, size: Int, first: Boolean, last: Boolean, numberOfElements: Int, sort: JsonNode }
type Pageable @shareable { pageNumber: Int, pageSize: Int, offset: Int }
type ResourceCount @shareable { resourceId: String, count: Int }
scalar JsonNode

# --- Owned entity: a workspace ---
type WorkspaceV2 @key(fields: "id") {
  id: ID!                          # resolver derives from workspaceHumanId || humanId
  workspaceType: CodeDescription
  workspaceTypeElastic: Int
  description: String
  status: Status                   # computed { id: status, name: statusName }
  setDates: [String]
  protoApprovalDueDate: String
  setDateRange: DateRange
  version: Int
  enableDateRule: Boolean
  productsCount: Int
  resources: ResourceMapping
  createdAt: DateTime
  updatedAt: DateTime
  # field resolvers ↓
  businessPartners: [VMM_BusinessPartner]
  droppedPartners: [VMM_BusinessPartner]
  droppedPartnerIds: [ID]
  notRemovablePartnerIds: [ID]
  unDroppablePartners(isDesignPartner: Boolean): [ID]
  divisions: [IG_Division]
  departments: [WorkspaceDepartmentV2]
  brands: [VMM_Brand]
  clazzes: [IG_Clazz]
  designCycles: [Tag]
  tags: [Tag]
  createdBy: UserProfileAttributes
  updatedBy: UserProfileAttributes
  discussions(partnerId: ID): DiscussionPaged
  discussionsV2(partnerId: ID): DiscussionElastic
  teams(includeSystemTeams: Boolean): TeamPaged
  attachmentsWithMetaData: [AttachmentWithMetaData]
  attachmentsV3(partnerId: ID, type: String, tags: [String]): SearchAttachmentsPaged
  sampleReport: WorkspaceReportV2
  products(page: Int = 0, size: Int = 10000, q: String, filter: [String]): ProductsPaged
  combinations(page: Int = 0, size: Int = 20, q: String, filter: [String]): CombinationSourcePaged
  counts(page: Int = 0, size: Int = 10000, q: String, filter: [String]): WorkspaceCountsV2
}

type WorkspaceDepartmentV2 { node: IG_Department!, clazzes: [IG_Clazz] }
type DateRange { start: String, end: String }
type WorkspaceCountsV2 {
  productsDiscussionsCount: [ResourceCount]
  productsSamplesCount: [ResourceCount]
  productsCount: Int
  nonEvaluatedRecievedSamplesCount: Int
  workspaceProductDashboard: WorkspaceProductDashboard
}
type WorkspaceProductDashboard {
  sampleStatusSummary: WorkspaceProductDashboardStatusCount
  sampleTrackingStatusSummary: WorkspaceProductDashboardStatusCount @deprecated
  bomStatusSummary: WorkspaceProductDashboardStatusCount
  productBomStatusSummary: WorkspaceProductDashboardStatusCount
  packagingBomStatusSummary: WorkspaceProductDashboardStatusCount
  claimsStatusSummary: WorkspaceProductDashboardStatusCount
  constructionSetStatusSummary: WorkspaceProductDashboardStatusCount
  measurementsStatusSummary: WorkspaceProductDashboardStatusCount
  packagingStatusSummary: WorkspaceProductDashboardStatusCount
}
type WorkspaceProductDashboardStatusCount { statusCounts: [StatusCount], totalCount: Int }
type StatusCount { statusId: Int, count: Int }
type WorkspaceReportV2 { workspaceSamplesCount: Int, virtualSampleCount: Int, productSampleFirstRoundCount: Int, virtualSampleFirstRoundCount: Int }
type AttachmentWithMetaData {
  attachment: Attachment
  linkedResourceId: ID
  resourceTitle: String
  isResourceDraft: Boolean
  isSampleDiscussion: Boolean
  isResourceCritical: Boolean
  currentUserPermissions: ResourcePermissions
}
type WorkspacesPagedV2 { content: [WorkspaceV2], paging: Paging, pageable: Pageable }
type WorkspacesPagedV3 { content: [WorkspaceV2], paging: Paging, pageable: Pageable }
type WorkspaceContentResult { products: [WorkspaceProductResult] }
type WorkspaceProductResult { id: String, sampleIds: [String] }
type WorkspaceTypeCount { products: Int, combinations: Int, research: Int }
type WorkspaceExportReceipt { requestId: String, attachmentCount: Int }

# --- Inputs ---
input CreateWorkspaceInputV2 {
  workspaceType: Int  description: String  status: ID  divisionIds: [ID]
  departmentIds: [DepartmentInputV2]!  brandIds: [ID]!  designCycles: [ID]  setDates: [String]
  tags: [ID]  protoApprovalDueDate: String  setDateRange: DateRangeInput
}
input UpdateWorkspaceInputV2 {
  id: ID!  workspaceType: Int  description: String  status: ID  divisionIds: [ID]
  departmentIds: [DepartmentInputV2]  brandIds: [ID]  designCycles: [ID]  setDates: [String]
  tags: [ID]  protoApprovalDueDate: String  setDateRange: DateRangeInput
}
input DepartmentInputV2 { departmentId: ID, classId: [ID] }
input DateRangeInput { start: String, end: String }
input WorkspaceTeamInput { teamId: String!, existingGroups: AccessPermission!, businessPartnerId: ID, partnerType: Int }
input WorkspacePartnerActionInputV2 { workspaceId: ID, resourceType: String, partnerId: ID, teamInput: [WorkspaceTeamInput], dropped: Boolean, partnerType: Int }
input WorkspacePartner { partnerId: ID, partnerType: [Int] }
input WorkspaceExportOptions {
  includeThumbnails: Boolean  q: String  showHidden: Boolean  filterProductsWithoutSamples: Boolean
  status: [String]  sampleStatus: [String]  trackingStatus: [String]  tags: [String]  brandId: [String]
  partnerId: [ID]  classId: [String]  departmentId: [String]  designCycle: [String]  sampleType: [String]
  setDates: [String]  carryForwardReason: [String]  useBpStatus: Boolean  userProfileId: String!
  workspaceId: String!  workspaceDescription: String!  productId: [String]
}
scalar AccessPermission   # SPARK_AccessPermission — opaque grant map (owned by access-control)

# --- Queries (names + nullability preserved from the SDL) ---
extend type Query {
  getWorkspaceV2(id: ID!, metric: Boolean = false): WorkspaceV2                                              # 🔜 B01
  getWorkspacesByIdsV2(ids: [ID]!): [WorkspaceV2]                                                            # 🔜 B02
  getWorkspaceTypeCount: WorkspaceTypeCount                                                                  # 🔜 B03
  findWorkspaceProductAndSampleIds(workspaceId: String!, q: String, filter: [String]): WorkspaceContentResult  # 🔜 B04 (🔴 product)
  findWorkspaceClaims(workspaceId: String!, q: String, filter: [String]): [Claims]                           # 🔜 B05 (🔴 search)
  getWorkspacePackagingAttachments(workspaceId: ID!, bpId: ID): [SearchAttachment]                           # 🔜 B06 (🔴 search; env tag)
  getWorkspacesPagedV2(productIds: [ID], description: [String], brandIds: [ID], departmentIds: [ID], page: Int!, size: Int!): WorkspacesPagedV2   # 🔜 C01 (🔴 search)
  getWorkspacesPagedV3(description: [String], brandId: [ID], departmentId: [ID], designCycle: [ID], workspaceType: [Int], page: Int!, size: Int!, q: String, designPartnerIds: [ID]): WorkspacesPagedV3  # 🔜 C02 (🔴 search)
}

# --- Mutations (names + nullability preserved from the SDL) ---
extend type Mutation {
  createWorkspaceV2(workspace: CreateWorkspaceInputV2!, validateUnique: Boolean): WorkspaceV2                # 🔜 D01 (dup-check throw)
  updateWorkspaceV2(workspace: UpdateWorkspaceInputV2!, validateUnique: Boolean): WorkspaceV2                # 🔜 D02 (dup-check throw)
  changeWorkspace(productId: String!, oldWorkspaceId: String!, newWorkspaceId: String!, teams: [WorkspaceTeamInput], removeWorkspaceOnly: Boolean): WorkspaceV2  # 🔜 D03
  addResourcesToWorkspaceV2(resourceList: [ID]!, workspaceId: ID, designCycle: String, setDates: [String]): WorkspaceV2  # 🔜 D04 (🔴 product side-effect)
  removeWorkspaceResourcesV2(workspaceId: ID!, resourceType: String!, resourceIds: [ID]!): WorkspaceV2       # 🔜 D05 (🔴 product cleanup)
  addTeamsToWorkspaceV3(workspaceId: ID!, teamInput: [WorkspaceTeamInput]): WorkspaceV2                      # 🔜 D06
  exportWorkspace(workspaceId: String!, exportType: String!, onlyIncludeAttachmentIds: [String], includeOnlyPrimaryThumbnails: Boolean, q: String, filter: [String]): WorkspaceExportReceipt  # 🔜 D07 (🔴 search)
  exportWorkspaceExcel(workspaceExportOptions: WorkspaceExportOptions!): WorkspaceExportReceipt              # 🔜 D08 (🔵 exportHub)
  exportPackagingFiles(workspaceId: String!, workspaceDescription: String!, exportContext: String, exportType: String!, q: String, filter: [String]): WorkspaceExportReceipt  # 🔜 D09 (🔴 search)
  workspaceBusinessPartnerActionsV2(actionType: String!, values: WorkspacePartnerActionInputV2): WorkspaceV2 # 🔜 E01  Very-High (5-case drop/undrop dispatcher)

  # --- Schema-drift wrappers: declared in the SDL, no top-level resolver (route through workspaceBusinessPartnerActionsV2). ---
  dropWorkspaceBusinessPartnerV2(workspaceId: ID!, partnerId: ID!): WorkspaceV2    @deprecated(reason: "use workspaceBusinessPartnerActionsV2(actionType:\"DROP_PARTNER\")")    # ⏭
  unDropWorkspaceBusinessPartnerV2(workspaceId: ID!, partnerId: ID!): WorkspaceV2  @deprecated(reason: "use workspaceBusinessPartnerActionsV2(actionType:\"UNDO_DROP_PARTNER\")")  # ⏭
}

