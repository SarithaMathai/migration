extend type Mutation {
  # 🔜 Create + workspace + optional copy
  addProduct(workspaceId: ID, sparkProduct: ProductInput, copyProduct: CopyProductInput): Product

  # 🔜 Update + archive attachments + optional copy
  updateProduct(input: ProductUpdateInput!, copyProduct: CopyProductInput): Product

  # 🔜 PUT carry_forward endpoint
  carryForwardProduct(productId: String, carryForwardProductInput: CarryForwardProductInput): Product

  # 🔜 Bulk PUT via mass_update
  bulkUpdateProducts(products: [ProductUpdateInput]!): ProductBulkType

  # 🔜 Bulk create + attachment linking + workspace add
  addProducts(workspaceId: ID!, products: [ProductInput]): ProductBulkType

  # 🔜 Add teams/partners + workspace context update
  addTeamsToProduct(productId: String!, teamIds: [String], workspaceIds: [String], newPartners: [ProductPartnerInput]): Product

  # 🔜 POST partners-add/bulk
  addBusinessPartnersToProductWithType(productId: ID!, partners: [ProductPartnerInput]): Product

  # 🔜 DELETE resources/bulk
  removeProductResources(productId: ID!, resourceIds: [ID]): Product

  # ⏭ Internal sub-operation of productBusinessPartnerActions — expose only via actionType=REMOVE_PARTNER
  removeProductBusinessPartner(productId: ID!, partnerId: ID!): Product

  # 🔜 PUT status_update/bulk
  updateBusinessPartnerStatuses(productId: String!, statusInput: [ProductPartnerStatusInput]!): Product

  # 🔜 Very High complexity: DROP_UNDROP relationship tree + ACL + sample side effects
  productBusinessPartnerActions(actionType: String!, values: ProductPartnerActionInput): Product

  # 🔜 PUT view toggle (hidden/visible)
  updateViewToggle(toggleInput: ToggleInput): Product

  # 🔜 PUT workspace attributes
  updateWorkspaceAttributes(productId: ID!, workspaceAttributesInput: ProductWorkspaceAttributesInput): Product

  # 🔜 POST partner drop
  dropProductBusinessPartner(productId: ID!, partnerId: ID!): Product

  # 🔜 POST partner undrop
  unDropProductBusinessPartner(productId: ID!, partnerId: ID!): Product

  # 🔜 Update team-workspace context associations
  updateProductTeamsWorkspaceContext(productId: ID!, teamWorkspacesToAdd: [WorkspaceTeamPair], teamWorkspacesToRemove: [WorkspaceTeamPair]): Product

  # 🔜 POST link child product to parent
  linkProduct(parentProductId: String!, childProductId: String!): Product

  # 🔜 POST unlink child product from parent
  unlinkProduct(parentProductId: String!, childProductId: String!): Product

  # 🔜 POST new rule
  addProductRule(rule: ProductRuleCreateInput): ProductRules

  # 🔜 PUT update rule
  updateProductRule(rule: ProductRuleUpdateInput): ProductRules

  # 🔜 DELETE rule by ID
  deleteProductRule(ruleId: ID!): Boolean

  # 🔜 Bulk component status update
  updateComponentStatus(productComponents: [ProductComponentStatusUpdateInput]): Product

  # 🔜 Component status update by component IDs
  updateComponentStatuses(productId: String!, ids: ComponentIdsInput!, status: ComponentStatusInput): Product
}

